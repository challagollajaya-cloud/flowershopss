spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://flowershopdb.postgres.database.azure.com:5432/flowershop}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:rootuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Root@123456}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.cache.type=none
server.port=8081
spring.thymeleaf.check-template-location=false