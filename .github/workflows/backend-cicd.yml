name: Deploy Spring Boot to Azure Container Apps

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Build JAR file
        run: ./mvnw clean package -DskipTests

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: flowershopregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image
        run: docker build -t flowershopregistry.azurecr.io/flowershop-api:latest .

      - name: Push Docker image
        run: docker push flowershopregistry.azurecr.io/flowershop-api:latest