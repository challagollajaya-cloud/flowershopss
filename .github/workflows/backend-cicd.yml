name: Deploy Spring Boot to Azure Container Apps

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR file
        run: ./mvnw clean package -DskipTests

      - name: Login to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: flowershopregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image
        run: docker build -t flowershopregistry.azurecr.io/flowershop-api:latest .

      - name: Push Docker image
        run: docker push flowershopregistry.azurecr.io/flowershop-api:latest

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        run: az containerapp update --name flowershop-api --resource-group flowershop-rg --image flowershopregistry.azurecr.io/flowershop-api:latest